<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; width: 240px; padding: 14px; margin: 0; color: #1e293b; }
    h1 { font-size: 14px; margin: 0 0 12px; }
    .row { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; font-size: 13px; }
    .count { font-size: 28px; font-weight: 800; color: #1E5FA8; }
    .muted { color: #64748b; font-size: 11px; margin-top: 8px; word-break: break-all; }
    .state-on { color: #16a34a; font-weight: 700; }
    .state-off { color: #94a3b8; font-weight: 700; }
    button { width: 100%; margin-top: 10px; padding: 9px; border: none; border-radius: 8px; background: #1E5FA8; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; }
    button:disabled { background: #94a3b8; cursor: default; }
    .result { font-size: 12px; margin-top: 8px; min-height: 16px; color: #16a34a; font-weight: 600; }
    .site { border-top: 1px solid #e2e8f0; margin-top: 12px; padding-top: 8px; }
    .site-name { font-size: 12px; font-weight: 700; color: #334155; }
    .hint { font-size: 10px; color: #94a3b8; margin-top: 6px; line-height: 1.4; }
    details { margin-top: 12px; border-top: 1px solid #e2e8f0; padding-top: 8px; }
    summary { font-size: 12px; font-weight: 700; color: #334155; cursor: pointer; }
    .field { display: block; font-size: 11px; color: #64748b; margin: 8px 0 3px; }
    input[type=text], input[type=password] { width: 100%; box-sizing: border-box; padding: 7px 9px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; font-family: inherit; outline: none; }
    button.outline { background: #fff; color: #1E5FA8; border: 1px solid #1E5FA8; }
  </style>
</head>
<body>
  <h1>🚛 リード監視</h1>
  <div class="row">
    <span>監視</span>
    <label><input type="checkbox" id="toggle" /> <span id="state" class="state-on">ON</span></label>
  </div>
  <div class="row">
    <span>本日の検知</span>
    <span class="count" id="count">0</span>
  </div>

  <div class="site">
    <div class="site-name">ズバット</div>
    <button id="resync">取りこぼしを取り込む</button>
    <div class="result" id="result"></div>
  </div>

  <div class="site">
    <div class="site-name">引越し侍</div>
    <button id="resyncSamurai">取りこぼしを取り込む</button>
    <div class="result" id="resultSamurai"></div>
    <div class="hint">※ 引越し侍の一覧ページ（取り込みたいページ）を開いた状態で押してください。件数により時間がかかります。</div>
  </div>

  <div class="site">
    <div class="site-name">価格.com</div>
    <button id="resyncKakaku">取りこぼしを取り込む</button>
    <div class="result" id="resultKakaku"></div>
    <div class="hint">※ 価格.comの見積もり一覧ページ（/admin/Index）を開いた状態で押してください。件数により時間がかかります。</div>
  </div>

  <details>
    <summary>🔑 ズバット 自動再ログイン</summary>
    <div class="hint">セッション切れ時に自動でログインし直します。ID/PWはこのPCのローカルにのみ保存され、ズバット以外には送信しません。</div>
    <label class="field">ログインID</label>
    <input type="text" id="zbaId" autocomplete="off" placeholder="ズバットのログインID" />
    <label class="field">パスワード</label>
    <input type="password" id="zbaPw" autocomplete="off" placeholder="ズバットのパスワード" />
    <button id="zbaSave">保存する</button>
    <button id="zbaTest" class="outline">今すぐログインを試す</button>
    <div class="result" id="zbaResult"></div>
    <div class="muted" id="zbaStatus" style="margin-top:8px;"></div>
  </details>

  <div class="muted" id="status">—</div>
  <script src="popup.js"></script>
</body>
</html>
